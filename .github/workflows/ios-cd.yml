name: iOS CD — TestFlight

# Disparo manual (workflow_dispatch) o al publicar un tag v*
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notas de versión para TestFlight (opcional)'
        required: false
        default: 'Nueva versión desde CI'
  push:
    tags:
      - 'v*'

# Impide despliegues paralelos; nunca cancela un vuelo en curso
concurrency:
  group: testflight-deploy
  cancel-in-progress: false

env:
  SCHEME: SmartStylist
  ARCHIVE_PATH: ${{ github.workspace }}/build/SmartStylist.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/export

jobs:
  deploy:
    name: Archive & Upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 ahead of the June 2026 deadline

    steps:
      # ── 1. Código ─────────────────────────────────────────────────────────
      - name: Checkout del código
        uses: actions/checkout@v4

      # ── 2. Herramientas ───────────────────────────────────────────────────
      - name: Instalar XcodeGen
        run: brew install xcodegen

      # ── 3. Secrets de API internas ────────────────────────────────────────
      # 'EOF' entre comillas: evita que el shell expanda nada dentro del heredoc.
      # El runner de Actions sustituye ${{ }} ANTES de ejecutar el script,
      # así que la clave llega literal al archivo .swift sin pasos intermedios.
      - name: Inyectar API Keys (Gemini + OpenWeather)
        run: |
          mkdir -p SmartStylist/Config
          cat << 'EOF' > SmartStylist/Config/APIKeys.swift
          import Foundation

          enum APIKeys {
              static let gemini = "${{ secrets.GEMINI_API_KEY }}"
              static let openWeather = "${{ secrets.WEATHER_API_KEY }}"
          }
          EOF

      # ── 4. Proyecto Xcode ─────────────────────────────────────────────────
      - name: Generar proyecto Xcode con XcodeGen
        run: xcodegen generate

      # ── 5. Certificado de distribución ────────────────────────────────────
      # Crea un keychain temporal, importa el .p12 y lo añade al search list.
      # set-key-partition-list permite que codesign acceda a la clave privada
      # sin prompt interactivo. El keychain se destruye al terminar el runner.
      - name: Instalar certificado de distribución
        env:
          DIST_CERT_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"
          security import "$RUNNER_TEMP/dist_cert.p12" \
            -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── 6. Perfil de aprovisionamiento ────────────────────────────────────
      # Instala el .mobileprovision con su UUID como nombre de archivo (formato
      # que Xcode espera). Exporta el UUID para usarlo en archive y export.
      - name: Instalar perfil de aprovisionamiento
        env:
          PROV_PROFILE: ${{ secrets.APP_STORE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROV_PROFILE" | base64 --decode > "$PP_PATH"

          UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null \
            | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

          echo "PROVISIONING_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      # ── 7. Clave App Store Connect (.p8) ──────────────────────────────────
      # Solo necesaria para el upload a TestFlight (paso 11).
      - name: Configurar clave App Store Connect
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_CONTENT" \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # ── 8. ExportOptions.plist ────────────────────────────────────────────
      # signingStyle: manual → usa el certificado y perfil instalados arriba,
      # sin contactar la API de Apple durante el archive/export.
      - name: Generar ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          mkdir -p build
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.rubenaparicio.SmartStylist</key>
                  <string>${PROVISIONING_PROFILE_UUID}</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      # ── 9. Archive ────────────────────────────────────────────────────────
      - name: Compilar y archivar (xcodebuild archive)
        env:
          TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild archive \
            -project SmartStylist.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      # ── 10. Export IPA ────────────────────────────────────────────────────
      - name: Exportar IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

      # ── 11. Upload a TestFlight ───────────────────────────────────────────
      - name: Subir a TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$EXPORT_PATH/SmartStylist.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ── 12. Artefacto de diagnóstico ─────────────────────────────────────
      # Disponible 30 días en la pestaña Actions para inspeccionar el IPA
      # incluso si el upload falló (if: always()).
      - name: Publicar IPA como artefacto de GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartStylist-build-${{ github.run_number }}.ipa
          path: ${{ env.EXPORT_PATH }}/SmartStylist.ipa
          if-no-files-found: ignore
          retention-days: 30
