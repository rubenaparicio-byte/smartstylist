name: SmartStylist
options:
  bundleIdPrefix: com.smartstylist
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  developmentLanguage: en

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "CY3J5RM5UX"
    PRODUCT_BUNDLE_IDENTIFIER: com.smartstylist.app
    INFOPLIST_FILE: SmartStylist/Info.plist

targets:
  SmartStylist:
    type: application
    platform: iOS
    sources:
      - SmartStylist
    info:
      path: SmartStylist/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "SmartStylist uses your location to fetch real-time weather for outfit suggestions."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Background location enables automatic morning outfit suggestions."
        NSPhotoLibraryUsageDescription: "Access your photo library to add clothing items."
        NSCameraUsageDescription: "SmartStylist uses the camera to photograph clothing items and automatically segment them from the background using on-device Vision analysis."
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        GIDClientID: "884365021205-vdi6hltsdh6vq6qjpnt73lr0khnpt0bg.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "com.googleusercontent.apps.884365021205-vdi6hltsdh6vq6qjpnt73lr0khnpt0bg"
    settings:
      base:
        ENABLE_PREVIEWS: YES
        PRODUCT_BUNDLE_IDENTIFIER: "com.rubenaparicio.SmartStylist"
        DEVELOPMENT_TEAM: "CY3J5RM5UX"
        CODE_SIGN_STYLE: "Automatic"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGNING_REQUIRED: YES
          PROVISIONING_PROFILE_SPECIFIER: "$(PROVISIONING_PROFILE_UUID_CI)"
    entitlements:
      path: SmartStylist/SmartStylist.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rubenaparicio.SmartStylist
        com.apple.developer.weatherkit: true
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - sdk: WeatherKit.framework

  SmartStylistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SmartStylistTests
    dependencies:
      - target: SmartStylist

  SmartStylistUITests:
    type: bundle.ui-test
    platform: iOS
    sources:
      - SmartStylistUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.rubenaparicio.SmartStylistUITests"
        DEVELOPMENT_TEAM: "CY3J5RM5UX"
    dependencies:
      - target: SmartStylist
